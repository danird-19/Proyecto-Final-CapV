<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Canelita - Nuestra Carta</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.2/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
</head>
<body>

    <!-- BARRA DE NAVEGACION -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-canelita shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold" href="index.html">
                <i class="bi bi-fire"></i> Canelita
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="index.html">
                            <i class="bi bi-house"></i> Inicio
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" href="carta.html">
                            <i class="bi bi-journal-bookmark"></i> Carta
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="tareas.html">
                            <i class="bi bi-list-task"></i> Tareas
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- ENCABEZADO CARTA -->
    <header class="carta-header py-5">
        <div class="container text-center">
            <h1 class="carta-title mb-2">
                <i class="bi bi-journal-bookmark"></i> Nuestra Carta
            </h1>
            <p class="carta-subtitle text-muted fs-5">
                Platos criollos preparados con las mejores especias del Peru
            </p>
        </div>
    </header>

    <!-- CONTENIDO CARTA -->
    <main class="container py-4">

        <!-- Buscador de platos -->
        <div class="row mb-4">
            <div class="col-md-6 mx-auto">
                <div class="input-group shadow-sm">
                    <span class="input-group-text bg-white border-end-0">
                        <i class="bi bi-search text-muted"></i>
                    </span>
                    <input type="text" class="form-control border-start-0 ps-0"
                           id="menu-search" placeholder="Buscar plato por nombre...">
                </div>
            </div>
        </div>

        <!-- Filtros por categoria -->
        <div class="text-center mb-5">
            <div class="d-flex flex-wrap justify-content-center gap-2" id="category-filters">
                <button class="btn btn-canelita category-btn active" data-category="Todos">
                    Todos
                </button>
                <button class="btn btn-outline-secondary category-btn" data-category="Entradas">
                    <i class="bi bi-cup-hot"></i> Entradas
                </button>
                <button class="btn btn-outline-secondary category-btn" data-category="Fondos">
                    <i class="bi bi-egg-fried"></i> Fondos
                </button>
                <button class="btn btn-outline-secondary category-btn" data-category="Aeropuertos">
                    <i class="bi bi-airplane"></i> Aeropuertos
                </button>
                <button class="btn btn-outline-secondary category-btn" data-category="Bebidas">
                    <i class="bi bi-cup-straw"></i> Bebidas
                </button>
            </div>
        </div>

        <!-- Lista de platos -->
        <div id="menu-container" class="row g-4">
            <!-- Se renderiza dinamicamente -->
        </div>

        <!-- Sin resultados -->
        <div id="no-results" class="text-center py-5 d-none">
            <i class="bi bi-search display-1 text-muted"></i>
            <p class="text-muted mt-3 fs-5">No se encontraron platos.</p>
        </div>

    </main>

    <!-- FOOTER -->
    <footer class="bg-dark text-white py-4 mt-5">
        <div class="container text-center">
            <p class="mb-1">
                <i class="bi bi-fire"></i> <strong>Restaurante Canelita</strong> - Comida Criolla Peruana
            </p>
            <p class="mb-0 text-muted small">
                Proyecto Universitario &copy; 2026
            </p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/carta.js"></script>
</body>
</html>
